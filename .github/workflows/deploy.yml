name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Clone or Pull the repository
            if [ ! -d "Whatsapp-automation-bot" ]; then
              git clone https://github.com/canadancing/Whatsapp-automation-bot.git
            fi
            
            cd Whatsapp-automation-bot
            git pull origin main

            # 2. Inject Secrets into .env file
            cat <<EOF > .env
            EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            WHATSAPP_GROUP_JID=${{ secrets.WHATSAPP_GROUP_JID }}
            EOF

            # 3. Start Docker Databases & API
            docker compose up -d

            # 4. Install production dependencies and restart the backend
            cd backend
            npm install --production
            pm2 restart whatsapp-dashboard || pm2 start index.js --name whatsapp-dashboard
            pm2 save
